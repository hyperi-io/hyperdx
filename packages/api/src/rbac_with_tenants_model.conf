# Casbin RBAC Model with Tenant/Domain Support
# Used by both node-casbin (HyperDX) and pycasbin (DFE Python UI)
#
# Request: (subject, domain, object, action)
#   sub = user email (from OIDC)
#   dom = team name (from OIDC group claim)
#   obj = resource type (dashboards, alerts, connections, etc.)
#   act = action (read, write, delete, admin)

[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act

[role_definition]
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub, r.dom) && r.dom == p.dom && r.obj == p.obj && r.act == p.act
